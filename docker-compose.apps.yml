# Optional application stack on top of Postgres + Redis.
# Run `scripts/generate-secrets.sh` before first `up` (creates ./secrets/jwt_secret.txt).
# Usage (from repo root):
#   docker compose -f docker-compose.base-images.yml build
#   docker compose -f docker-compose.yml -f docker-compose.apps.yml up --build
#
# See docs/docker/testing.md.

x-deps-image: &deps-image
  DEPS_IMAGE: agenticverdict/deps:local

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt

services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        <<: *deps-image
        # Vite compile-time API base consumed by browser bundle in production-like runtime.
        VITE_PUBLIC_API_URL: ${VITE_PUBLIC_API_URL:-http://localhost:4000}
        # Required by /$locale home loader for demo tenant config resolution.
        VITE_PUBLIC_DEFAULT_TENANT_ID: ${VITE_PUBLIC_DEFAULT_TENANT_ID:-11111111-1111-4111-8111-111111111111}
    ports:
      - "3000:3000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=deploy/security/seccomp-profile.json
    environment:
      NODE_ENV: production
      AGENTICVERDICT_RUNTIME_ENV: production
      PORT: "3000"
      # SSR/server-side API calls must resolve the API service over the compose network.
      API_URL: ${FRONTEND_INTERNAL_API_URL:-http://api:4000}
      # Keep runtime env aligned with build-time value for diagnostics and fallbacks.
      VITE_PUBLIC_API_URL: ${VITE_PUBLIC_API_URL:-http://localhost:4000}
      VITE_PUBLIC_DEFAULT_TENANT_ID: ${VITE_PUBLIC_DEFAULT_TENANT_ID:-11111111-1111-4111-8111-111111111111}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agenticverdict
      REDIS_URL: redis://redis:6379
      TENANT_CONFIG_DIR: /app/configs/tenants
      TMPDIR: /tmp
      XDG_CACHE_HOME: /tmp/.cache
    networks:
      - agenticverdict
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        <<: *deps-image
    ports:
      - "4000:4000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=deploy/security/seccomp-profile.json
    environment:
      NODE_ENV: production
      AGENTICVERDICT_RUNTIME_ENV: production
      PORT: "4000"
      API_HOST: "0.0.0.0"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agenticverdict
      REDIS_URL: redis://redis:6379
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      TENANT_CONFIG_DIR: /app/configs/tenants
      TMPDIR: /tmp
      XDG_CACHE_HOME: /tmp/.cache
    secrets:
      - jwt_secret
    networks:
      - agenticverdict
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      args:
        <<: *deps-image
        CHROMIUM_IMAGE: agenticverdict/chromium-base:local
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=deploy/security/seccomp-profile.json
    environment:
      NODE_ENV: production
      AGENTICVERDICT_RUNTIME_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agenticverdict
      REDIS_URL: redis://redis:6379
      TENANT_CONFIG_DIR: /app/configs/tenants
      TMPDIR: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      WORKER_HEALTH_PORT: "9465"
      # Prometheus scrape target (Phase 2 production-flow observability)
      WORKER_METRICS_PORT: "9464"
      PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      AGENTICVERDICT_STUB_REPORT_FORMATS: "0"
      AGENTICVERDICT_STUB_EMAIL_DELIVERY: "0"
    networks:
      - agenticverdict
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 avoids IPv6-first "localhost" resolution issues; server must answer HEAD (wget --spider).
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9465/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
