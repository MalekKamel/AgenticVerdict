global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/circuit-breaker.yml
  - /etc/prometheus/alerts/queues.yml
  - /etc/prometheus/alerts/database-queries.yml
  - /etc/prometheus/alerts/tenant-security.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Production-flow test metrics: API exposes enqueue + scenario telemetry; worker exposes
  # BullMQ workflow-trigger completion histograms. Requires `docker-compose.apps.yml` (or
  # equivalent) on network `agenticverdict`. Worker listens on WORKER_METRICS_PORT (9464).
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:4000"]

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9464"]

  # Optional: frontend metrics when the Next.js app exposes /metrics.
  # - job_name: frontend
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["frontend:3000"]
