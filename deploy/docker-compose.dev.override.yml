# Development override for mock adapter testing (NODE_ENV=development).
# Adapter aggregate health is served by the Web app (Next.js); include `web` when using mocks.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.apps.yml \
#     -f deploy/docker-compose.dev.override.yml up
#
# NOTE: API/worker images should be built with TARGET_STAGE=development (see apps/*/Dockerfile)
# so the copied tree matches a non-production NODE_ENV. This file sets the same via build args.
# Web service cannot use mock adapters in Docker due to Next.js standalone limitations.
# For production-flow scenarios (R01/R02), mock adapters are not needed as they use fixed HTML.

services:
  api:
    build:
      args:
        TARGET_STAGE: development
        NODE_ENV: "development"
    environment:
      NODE_ENV: "development"
      AGENTICVERDICT_USE_MOCK_ADAPTERS: "1"
      # Optional LLM: set in a gitignored `.env` at repo root or `export` before `docker compose up`
      # (Compose substitutes ${VAR}; never commit real keys).
      GLM_API_KEY: ${GLM_API_KEY:-}
      GLM_API_BASE_URL: ${GLM_API_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      GLM_MODEL: ${GLM_MODEL:-glm-4.5}
      GLM_TIMEOUT: ${GLM_TIMEOUT:-30000}

  worker:
    build:
      args:
        TARGET_STAGE: development
        NODE_ENV: "development"
    environment:
      NODE_ENV: "development"
      AGENTICVERDICT_USE_MOCK_ADAPTERS: "1"
      GLM_API_KEY: ${GLM_API_KEY:-}
      GLM_API_BASE_URL: ${GLM_API_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      GLM_MODEL: ${GLM_MODEL:-glm-4.5}
      GLM_TIMEOUT: ${GLM_TIMEOUT:-30000}

  # Web service uses production build (mock adapters not supported in Docker)
  # For mock adapter testing, use local `pnpm dev` instead
