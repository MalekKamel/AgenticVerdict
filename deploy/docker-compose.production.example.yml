# Example production-oriented Compose (trimmed, valid YAML).
# Compose layout and production notes: docs/docker/compose-and-networking.md
# Secrets, env, TLS: docs/docker/environment-and-secrets.md and docs/docker/getting-started.md
#
# JWT: create repo-root secrets/jwt_secret.txt (e.g. scripts/generate-secrets.sh) before `up`.
# This file is not wired by default. Use as a starting point on Linux hosts with Docker Swarm
# secrets or equivalent, after building/pushing images:
#   docker compose -f deploy/docker-compose.production.example.yml up -d
#
# AppArmor (optional): docker compose -f deploy/docker-compose.production.example.yml \
#   -f deploy/docker-compose.security-linux.override.yml up -d

name: agenticverdict-prod

secrets:
  jwt_secret:
    file: ../secrets/jwt_secret.txt

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
      - /run:noexec,nosuid,size=256m
    # Same as root docker-compose.yml: entrypoint must chown/chmod data dir (no cap_drop: ALL).
    security_opt:
      - no-new-privileges:true
      - seccomp=security/seccomp-profile.json
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: agenticverdict
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agenticverdict
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agenticverdict"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    # Same as root docker-compose.yml: avoid stock entrypoint setuid under hardening.
    security_opt:
      - seccomp=security/seccomp-profile.json
    user: "999:999"
    entrypoint: ["redis-server"]
    command: ["--dir", "/data", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - agenticverdict
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${REGISTRY:-agenticverdict}/web:${VERSION:-latest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=security/seccomp-profile.json
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/agenticverdict
      REDIS_URL: redis://redis:6379
      TMPDIR: /tmp
      XDG_CACHE_HOME: /tmp/.cache
    networks:
      - agenticverdict
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    image: ${REGISTRY:-agenticverdict}/api:${VERSION:-latest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=security/seccomp-profile.json
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      API_HOST: "0.0.0.0"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/agenticverdict
      REDIS_URL: redis://redis:6379
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      TMPDIR: /tmp
      XDG_CACHE_HOME: /tmp/.cache
    secrets:
      - jwt_secret
    networks:
      - agenticverdict
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ${REGISTRY:-agenticverdict}/worker:${VERSION:-latest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=security/seccomp-profile.json
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/agenticverdict
      REDIS_URL: redis://redis:6379
      TMPDIR: /tmp
      XDG_CACHE_HOME: /tmp/.cache
    networks:
      - agenticverdict
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  agenticverdict:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  redis_data:
