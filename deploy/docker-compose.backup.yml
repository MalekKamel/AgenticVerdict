# Overlay: periodic Postgres dumps via prodrigestivill/postgres-backup-local — see docs/docker/operations.md.
# Usage: docker compose -f docker-compose.yml -f deploy/docker-compose.backup.yml up -d
services:
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: agenticverdict
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
    volumes:
      - pg_backups:/backups
    networks:
      - agenticverdict
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  pg_backups:
