# Development-oriented API/worker images: non-production NODE_ENV + mock adapter env.
# This file also defines a compose watch workflow that rebuilds services when source files change.
# Usage (repo root):
#   docker compose -f docker-compose.yml -f docker-compose.apps.yml -f docker-compose.dev.yml up -d --build
#   docker compose -f docker-compose.yml -f docker-compose.apps.yml -f docker-compose.dev.yml watch

services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        DEPS_IMAGE: agenticverdict/deps:local
        # Ensure production-built frontend bundle has an explicit browser API base.
        VITE_PUBLIC_API_URL: ${VITE_PUBLIC_API_URL:-http://localhost:4000}
        VITE_PUBLIC_DEFAULT_TENANT_ID: ${VITE_PUBLIC_DEFAULT_TENANT_ID:-11111111-1111-4111-8111-111111111111}
    develop:
      watch:
        - action: rebuild
          path: ./apps/frontend
        - action: rebuild
          path: ./packages
        - action: rebuild
          path: ./configs
        - action: rebuild
          path: ./pnpm-lock.yaml
        - action: rebuild
          path: ./pnpm-workspace.yaml
        - action: rebuild
          path: ./turbo.json

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        TARGET_STAGE: development
        NODE_ENV: development
    environment:
      NODE_ENV: development
      AGENTICVERDICT_USE_MOCK_ADAPTERS: "1"
      GLM_API_KEY: ${GLM_API_KEY:-}
      GLM_API_BASE_URL: ${GLM_API_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      GLM_MODEL: ${GLM_MODEL:-glm-4.5}
      GLM_TIMEOUT: ${GLM_TIMEOUT:-30000}
    develop:
      watch:
        - action: rebuild
          path: ./apps/api
        - action: rebuild
          path: ./packages
        - action: rebuild
          path: ./configs
        - action: rebuild
          path: ./pnpm-lock.yaml
        - action: rebuild
          path: ./pnpm-workspace.yaml
        - action: rebuild
          path: ./turbo.json

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      args:
        TARGET_STAGE: development
        NODE_ENV: development
    environment:
      NODE_ENV: development
      AGENTICVERDICT_USE_MOCK_ADAPTERS: "1"
      GLM_API_KEY: ${GLM_API_KEY:-}
      GLM_API_BASE_URL: ${GLM_API_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      GLM_MODEL: ${GLM_MODEL:-glm-4.5}
      GLM_TIMEOUT: ${GLM_TIMEOUT:-30000}
    develop:
      watch:
        - action: rebuild
          path: ./apps/worker
        - action: rebuild
          path: ./packages
        - action: rebuild
          path: ./configs
        - action: rebuild
          path: ./pnpm-lock.yaml
        - action: rebuild
          path: ./pnpm-workspace.yaml
        - action: rebuild
          path: ./turbo.json
