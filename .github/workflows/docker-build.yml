name: Docker build

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  frontend:
    name: Image — frontend
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'trigger:build-docker'))
    steps:
      - uses: actions/checkout@v4
      - name: Clean local build artifacts (Docker context)
        run: bash scripts/docker-prep.sh
      - name: GHCR image base (lowercase)
        id: ghcr
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build workspace deps layer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile.deps
          load: true
          tags: agenticverdict/deps:ci
          cache-from: type=gha,scope=monorepo-deps
          cache-to: type=gha,mode=max,scope=monorepo-deps
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: agenticverdict/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=AgenticVerdict Frontend
            org.opencontainers.image.description=Next.js frontend application for AgenticVerdict
            org.opencontainers.image.vendor=AgenticVerdict
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            DEPS_IMAGE=agenticverdict/deps:ci
            VITE_PUBLIC_API_URL=http://localhost:4000
            VITE_PUBLIC_DEFAULT_TENANT_ID=11111111-1111-4111-8111-111111111111
          cache-from: |
            type=registry,ref=${{ steps.ghcr.outputs.base }}/build-cache:frontend
            type=gha,scope=frontend
          cache-to: |
            type=registry,ref=${{ steps.ghcr.outputs.base }}/build-cache:frontend,mode=max
            type=gha,mode=max,scope=frontend

  api:
    name: Image — api
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'trigger:build-docker'))
    steps:
      - uses: actions/checkout@v4
      - name: Clean local build artifacts (Docker context)
        run: bash scripts/docker-prep.sh
      - name: GHCR image base (lowercase)
        id: ghcr
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build workspace deps layer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile.deps
          load: true
          tags: agenticverdict/deps:ci
          cache-from: type=gha,scope=monorepo-deps
          cache-to: type=gha,mode=max,scope=monorepo-deps
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: agenticverdict/api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=AgenticVerdict API
            org.opencontainers.image.description=Fastify API service for AgenticVerdict
            org.opencontainers.image.vendor=AgenticVerdict
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            DEPS_IMAGE=agenticverdict/deps:ci
          cache-from: |
            type=registry,ref=${{ steps.ghcr.outputs.base }}/build-cache:api
            type=gha,scope=api
          cache-to: |
            type=registry,ref=${{ steps.ghcr.outputs.base }}/build-cache:api,mode=max
            type=gha,mode=max,scope=api

  worker:
    name: Image — worker
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'trigger:build-docker'))
    steps:
      - uses: actions/checkout@v4
      - name: Clean local build artifacts (Docker context)
        run: bash scripts/docker-prep.sh
      - name: GHCR image base (lowercase)
        id: ghcr
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build workspace deps layer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile.deps
          load: true
          tags: agenticverdict/deps:ci
          cache-from: type=gha,scope=monorepo-deps
          cache-to: type=gha,mode=max,scope=monorepo-deps
      - name: Build Chromium base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile.chromium
          load: true
          tags: agenticverdict/chromium-base:ci
          cache-from: type=gha,scope=chromium-base
          cache-to: type=gha,mode=max,scope=chromium-base
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: agenticverdict/worker
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=AgenticVerdict Worker
            org.opencontainers.image.description=BullMQ background worker for AgenticVerdict
            org.opencontainers.image.vendor=AgenticVerdict
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            DEPS_IMAGE=agenticverdict/deps:ci
            CHROMIUM_IMAGE=agenticverdict/chromium-base:ci
          cache-from: |
            type=registry,ref=${{ steps.ghcr.outputs.base }}/build-cache:worker
            type=gha,scope=worker
          cache-to: |
            type=registry,ref=${{ steps.ghcr.outputs.base }}/build-cache:worker,mode=max
            type=gha,mode=max,scope=worker

  performance:
    name: Build performance metrics
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Clean local build artifacts (Docker context)
        run: bash scripts/docker-prep.sh
      - uses: docker/setup-buildx-action@v3
      - name: Run build performance measurement
        run: |
          chmod +x scripts/measure-build-performance.sh
          scripts/measure-build-performance.sh frontend
          scripts/measure-build-performance.sh api
          scripts/measure-build-performance.sh worker
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-performance-logs
          path: .build-metrics/build-*.log
      - name: Generate build summary
        run: |
          echo "## Docker Build Performance" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | CACHED Lines | Step Lines | Heuristic Hit Rate |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------------|------------|--------------------|" >> "$GITHUB_STEP_SUMMARY"
          for service in frontend api worker; do
            log_file="$(ls -1t .build-metrics/build-${service}-*.log | head -n 1)"
            cached="$(awk 'BEGIN { c=0 } /CACHED/ { c++ } END { print c+0 }' "$log_file")"
            total="$(awk 'BEGIN { t=0 } /^#/ { t++ } END { print t+0 }' "$log_file")"
            rate="$(awk -v c="$cached" -v t="$total" 'BEGIN { if (t+0 <= 0) print "n/a"; else printf "%.2f%%", (c / t) * 100 }')"
            echo "| ${service} | ${cached} | ${total} | ${rate} |" >> "$GITHUB_STEP_SUMMARY"
          done
