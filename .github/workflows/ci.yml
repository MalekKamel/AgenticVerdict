name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Policy: docs/05-reference/dependency-audit-policy.md — informational until critical backlog is cleared.
      - name: Dependency audit (informational)
        continue-on-error: true
        run: pnpm audit 2>&1 | tee pnpm-audit-report.txt

      - name: Upload dependency audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit-report
          path: pnpm-audit-report.txt
          if-no-files-found: ignore

      - name: Install Playwright Chromium (report-generator PDF unit tests)
        run: pnpm --filter @agenticverdict/report-generator exec playwright install chromium

      - name: Format (Prettier check)
        run: pnpm run format:check

      - name: Validate Pencil .pen files (design tokens pipeline)
        run: pnpm run validate:pen-files

      - name: Lint and typecheck (Turbo)
        run: pnpm exec turbo run lint typecheck

      - name: Circular dependency check
        run: pnpm run check:cycles

      - name: Unit tests with coverage (Vitest)
        run: pnpm exec vitest run --coverage

      - name: Web app unit coverage (scoped hooks + tRPC modules)
        run: pnpm --filter @agenticverdict/frontend exec vitest run --coverage

      - name: Web production build
        run: pnpm --filter @agenticverdict/frontend build

      - name: Verify build constants
        run: pnpm run verify:build-config

      - name: Production Vite bundles (mock-code scan)
        env:
          NODE_ENV: production
        run: pnpm run verify:production-bundle

      - name: Scenario orchestration tests (R01–R12)
        env:
          SCENARIO_ARTIFACTS_DIR: ${{ github.workspace }}/scenario-artifacts
        run: pnpm run test:scenarios:all

      - name: Upload scenario document artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-documents
          path: scenario-artifacts/
          if-no-files-found: ignore

      - name: Phase 01 integration — mock APIs, load, chaos, performance
        run: pnpm run test:phase01-integration

      - name: OpenAPI lint (Phase 01 health spec)
        run: pnpm run lint:openapi

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality
    if: hashFiles('apps/web/playwright.config.mjs') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @agenticverdict/frontend exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm --filter @agenticverdict/frontend test:e2e

  desktop-e2e:
    name: Desktop (unit + Electron smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (Nitro .output for embedded server)
        run: pnpm --filter @agenticverdict/frontend build

      - name: Build desktop main/preload bundle
        run: pnpm --filter @agenticverdict/desktop build

      - name: Desktop IPC package (Vitest)
        run: pnpm --filter @agenticverdict/desktop-ipc test

      - name: Desktop unit tests (Vitest)
        run: pnpm --filter @agenticverdict/desktop test

      - name: Desktop embedded smoke (Playwright Electron)
        run: pnpm --filter @agenticverdict/desktop test:e2e
