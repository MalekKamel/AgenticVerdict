name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format (Prettier check)
        run: pnpm run format:check

      - name: Lint and typecheck (Turbo)
        run: pnpm exec turbo run lint typecheck

      - name: Circular dependency check
        run: pnpm run check:cycles

      - name: Unit tests with coverage (Vitest)
        run: pnpm exec vitest run --coverage

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality
    if: hashFiles('apps/web/playwright.config.mjs') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @agenticverdict/web exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm --filter @agenticverdict/web test:e2e
