name: Docker release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: docker-release-${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Push image — frontend
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Clean local build artifacts (Docker context)
        run: bash scripts/docker-prep.sh
      - name: GHCR image base (lowercase)
        id: ghcr
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build workspace deps layer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile.deps
          load: true
          tags: agenticverdict/deps:ci
          cache-from: type=gha,scope=monorepo-deps
          cache-to: type=gha,mode=max,scope=monorepo-deps
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.ghcr.outputs.base }}/frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
          labels: |
            org.opencontainers.image.title=AgenticVerdict Frontend
            org.opencontainers.image.description=Next.js frontend application for AgenticVerdict
            org.opencontainers.image.vendor=AgenticVerdict
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            DEPS_IMAGE=agenticverdict/deps:ci
            VITE_PUBLIC_API_URL=http://localhost:4000
            VITE_PUBLIC_DEFAULT_TENANT_ID=11111111-1111-4111-8111-111111111111
          cache-from: |
            type=registry,ref=${{ steps.ghcr.outputs.base }}/build-cache:frontend
            type=gha,scope=frontend
          cache-to: |
            type=registry,ref=${{ steps.ghcr.outputs.base }}/build-cache:frontend,mode=max
            type=gha,mode=max,scope=frontend
      - uses: sigstore/cosign-installer@v3.8.0
        with:
          cosign-release: v2.4.1
      - name: Cosign sign image (keyless / OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${{ steps.ghcr.outputs.base }}/frontend@${DIGEST}"

  api:
    name: Push image — api
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Clean local build artifacts (Docker context)
        run: bash scripts/docker-prep.sh
      - name: GHCR image base (lowercase)
        id: ghcr
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build workspace deps layer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile.deps
          load: true
          tags: agenticverdict/deps:ci
          cache-from: type=gha,scope=monorepo-deps
          cache-to: type=gha,mode=max,scope=monorepo-deps
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.ghcr.outputs.base }}/api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
          labels: |
            org.opencontainers.image.title=AgenticVerdict API
            org.opencontainers.image.description=Fastify API service for AgenticVerdict
            org.opencontainers.image.vendor=AgenticVerdict
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            DEPS_IMAGE=agenticverdict/deps:ci
          cache-from: |
            type=registry,ref=${{ steps.ghcr.outputs.base }}/build-cache:api
            type=gha,scope=api
          cache-to: |
            type=registry,ref=${{ steps.ghcr.outputs.base }}/build-cache:api,mode=max
            type=gha,mode=max,scope=api
      - uses: sigstore/cosign-installer@v3.8.0
        with:
          cosign-release: v2.4.1
      - name: Cosign sign image (keyless / OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${{ steps.ghcr.outputs.base }}/api@${DIGEST}"

  worker:
    name: Push image — worker
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Clean local build artifacts (Docker context)
        run: bash scripts/docker-prep.sh
      - name: GHCR image base (lowercase)
        id: ghcr
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build workspace deps layer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile.deps
          load: true
          tags: agenticverdict/deps:ci
          cache-from: type=gha,scope=monorepo-deps
          cache-to: type=gha,mode=max,scope=monorepo-deps
      - name: Build Chromium base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile.chromium
          load: true
          tags: agenticverdict/chromium-base:ci
          cache-from: type=gha,scope=chromium-base
          cache-to: type=gha,mode=max,scope=chromium-base
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.ghcr.outputs.base }}/worker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
          labels: |
            org.opencontainers.image.title=AgenticVerdict Worker
            org.opencontainers.image.description=BullMQ background worker for AgenticVerdict
            org.opencontainers.image.vendor=AgenticVerdict
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            DEPS_IMAGE=agenticverdict/deps:ci
            CHROMIUM_IMAGE=agenticverdict/chromium-base:ci
          cache-from: |
            type=registry,ref=${{ steps.ghcr.outputs.base }}/build-cache:worker
            type=gha,scope=worker
          cache-to: |
            type=registry,ref=${{ steps.ghcr.outputs.base }}/build-cache:worker,mode=max
            type=gha,mode=max,scope=worker
      - uses: sigstore/cosign-installer@v3.8.0
        with:
          cosign-release: v2.4.1
      - name: Cosign sign image (keyless / OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${{ steps.ghcr.outputs.base }}/worker@${DIGEST}"
