name: UI guidelines enforcement

on:
  pull_request:
    paths:
      - "design-system/**"
      - ".github/workflows/ui-guidelines-enforcement.yml"
  push:
    branches:
      - main
    paths:
      - "design-system/**"
      - ".github/workflows/ui-guidelines-enforcement.yml"

concurrency:
  group: ui-guidelines-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pen-files:
    name: Validate .pen files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Pencil .pen files (Python)
        run: python3 design-system/validate-pen-files.py
