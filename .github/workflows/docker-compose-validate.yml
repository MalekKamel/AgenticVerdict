name: Docker Compose validation

on:
  pull_request:
    paths:
      - "docker-compose*.yml"
      - "deploy/docker-compose*.yml"
      - "scripts/docker-*.sh"
      - "Makefile"
      - ".env.docker.example"
      - ".github/workflows/docker-compose-validate.yml"
  push:
    paths:
      - "docker-compose*.yml"
      - "deploy/docker-compose*.yml"
      - "scripts/docker-*.sh"
      - "Makefile"
      - ".env.docker.example"
      - ".github/workflows/docker-compose-validate.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose files
        run: bash scripts/docker-validate.sh

  compose-build-smoke:
    name: Compose build smoke
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Clean local build artifacts (Docker context)
        run: bash scripts/docker-prep.sh

      - uses: docker/setup-buildx-action@v3

      - name: Build base images (deps + chromium)
        run: docker compose -f docker-compose.base-images.yml build

      - name: Build application images (web, api, worker)
        run: docker compose -f docker-compose.yml -f docker-compose.apps.yml build
