<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Report is Ready</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background: #3b82f6;
        color: white;
        padding: 20px;
        text-align: center;
      }
      .content {
        padding: 20px;
        background: #f9fafb;
      }
      .button {
        display: inline-block;
        padding: 12px 24px;
        background: #3b82f6;
        color: white;
        text-decoration: none;
        border-radius: 4px;
      }
      .footer {
        text-align: center;
        padding: 20px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Your Report is Ready</h1>
      </div>
      <div class="content">
        <p>Hello,</p>
        <p>Your {{format}} report is now ready for download.</p>
        <p style="text-align: center; margin: 30px 0">
          <a href="{{downloadLink}}" class="button">Download Report</a>
        </p>
        <p>Or copy and paste this link into your browser:</p>
        <p style="word-break: break-all; color: #3b82f6">{{downloadLink}}</p>
        <p>This link will expire in 30 days.</p>
        <p style="font-size: 12px; color: #666">Report ID: {{reportId}}</p>
      </div>
      <div class="footer">
        <p>&copy; 2026 AgenticVerdict. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
